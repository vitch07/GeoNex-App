version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: geonex-db
    environment:
      POSTGRES_DB: geonex
      POSTGRES_USER: geonex
      POSTGRES_PASSWORD: geonex_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geonex"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
